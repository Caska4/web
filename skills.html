<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Skills</title>
    <link rel="stylesheet" href="style.css">
    <!-- Add Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #000; /* Black background */
            color: white; /* White text for contrast */
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px;
        }

        header nav ul {
            list-style-type: none;
            display: flex;
            justify-content: center;
        }

        header nav ul li {
            margin: 0 15px;
        }

        header nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        header nav ul li a:hover {
            color: #f4f4f4;
        }

        /* Skills Section */
        section.skills {
            background-color: #333; /* Dark background for skills section */
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 1200px;
            margin: 30px auto;
        }

        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 20px;
        }

        h1 span {
            color: #4caf50; /* Green for emphasis */
        }

        h2 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            color: white;
        }

        h2 i {
            margin-right: 10px;
            color: #4caf50; /* Green for icons */
        }

        .skills-container {
            display: flex;
            justify-content: space-between;
            gap: 30px;
        }

        /* Technical Skills */
        .technical-skills {
            width: 48%;
        }

        .skill {
            margin-bottom: 20px;
        }

        .skill p {
            font-size: 18px;
            display: flex;
            align-items: center;
            color: white;
        }

        .skill p i {
            margin-right: 10px;
            color: #ff6f61; /* Icon color */
        }

        .progress-bar {
            background-color: #555; /* Dark gray background for progress bars */
            border-radius: 10px;
            width: 100%;
            height: 8px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-bar span {
            display: block;
            height: 100%;
            background-color: #4caf50; /* Green for progress */
        }

        /* Professional Skills */
        .professional-skills {
            width: 48%;
        }

        .professional-skills .skill {
            margin-bottom: 20px;
        }

        .professional-skills .skill p {
            font-size: 18px;
            display: flex;
            align-items: center;
            color: white;
        }

        .professional-skills .skill p i {
            margin-right: 10px;
            color: #ff6f61; /* Icon color */
        }

        .progress-bar {
            background-color: #555; /* Dark gray background for progress bars */
            border-radius: 10px;
            width: 100%;
            height: 8px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-bar span {
            display: block;
            height: 100%;
            background-color: #4caf50; /* Green for progress */
        }

        /* Button Styles */
        .btn {
            display: inline-block;
            background-color: #4caf50;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="About.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="skills">
        <h1>My <span>Skills</span></h1>

        <div class="skills-container">
            <!-- Technical Skills -->
            <div class="technical-skills">
                <h2><i class="fas fa-laptop-code"></i> Technical Skills</h2>
                <div class="skill">
                    <p><i class="fab fa-html5"></i> HTML</p>
                    <div class="progress-bar"><span style="width: 100%;"></span></div>
                </div>
                <div class="skill">
                    <p><i class="fab fa-css3-alt"></i> CSS</p>
                    <div class="progress-bar"><span style="width: 100%;"></span></div>
                </div>
                <div class="skill">
                    <p><i class="fab fa-js-square"></i> JavaScript</p>
                    <div class="progress-bar"><span style="width: 100%;"></span></div>
                </div>
                <div class="skill">
                    <p><i class="fab fa-python"></i> Python</p>
                    <div class="progress-bar"><span style="width: 98%;"></span></div>
                </div>
                <div class="skill">
                    <p><i class="fab fa-react"></i> Bootstrap</p>
                    <div class="progress-bar"><span style="width: 96%;"></span></div>
                </div>
            </div>

            <!-- Professional Skills -->
            <div class="professional-skills">
                <h2><i class="fas fa-users"></i> Professional Skills</h2>
                <div class="skill">
                    <p><i class="fas fa-lightbulb"></i> Creativity</p>
                    <div class="progress-bar"><span style="width: 100%;"></span></div>
                </div>
                <div class="skill">
                    <p><i class="fas fa-comments"></i> Communication</p>
                    <div class="progress-bar"><span style="width: 100%;"></span></div>
                </div>
                <div class="skill">
                    <p><i class="fas fa-cogs"></i> Problem Solving</p>
                    <div class="progress-bar"><span style="width: 100%;"></span></div>
                </div>
                <div class="skill">
                    <p><i class="fas fa-users-cog"></i> Teamwork</p>
                    <div class="progress-bar"><span style="width: 100%;"></span></div>
                </div>
            </div>
        </div>

        <!-- Contact Button -->
        <a href="contact.html" class="btn">Contact Me</a>
    </section>

</body>
</html>
